name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  msrv-sync-changes:
    name: Detect MSRV Sync Changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect Relevant Changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"

          if [[ "${event_name}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${event_name}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          head_sha="${{ github.sha }}"

          if [[ "${base_sha}" =~ ^0+$ ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "${base_sha}" "${head_sha}" -- Cargo.toml rust-toolchain.toml; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

  msrv-sync:
    name: MSRV Sync
    needs: msrv-sync-changes
    if: needs.msrv-sync-changes.outputs.should_run == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: msrv-sync

      - name: Install cargo-msrv
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-msrv

      - name: Check MSRV Sync
        run: cargo x msrv

      - name: Verify MSRV
        run: cargo x msrv --verify

  check:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        check: [fmt, clippy, sort]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.check }}
          workspaces: |
            . -> target
            fuzz -> target

      - name: Install cargo-sort
        if: matrix.check == 'sort'
        run: cargo install cargo-sort

      - name: Install pinned nightly rustfmt
        if: matrix.check == 'fmt'
        run: rustup toolchain install nightly-2026-04-15 --profile minimal --component rustfmt

      - name: Run Cargo Fmt
        if: matrix.check == 'fmt'
        run: cargo x fmt --check

      - name: Run Cargo Clippy
        if: matrix.check == 'clippy'
        run: cargo clippy --all-targets --all-features --no-deps -- -D warnings

      - name: Check Fuzz Crate
        if: matrix.check == 'clippy'
        run: cargo check --manifest-path fuzz/Cargo.toml

      - name: Run Cargo Sort
        if: matrix.check == 'sort'
        run: cargo sort --workspace --grouped --check

  check-actions:
    name: Actions Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run actionlint
        uses: farazdagi/action-actionlint@70abd65766f0daeed92198b965bedf5d79a4ab17 # v0.1.1
        with:
          version: 1.7.12

  test-full:
    name: Tests (Full, ${{ matrix.postgres_label }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - postgres_label: postgres-18
            postgres_version: 18
            postgres_image: postgres:18
            coverage: true
          - postgres_label: postgres-17
            postgres_version: 17
            postgres_image: postgres:17
            coverage: false
          - postgres_label: postgres-16
            postgres_version: 16
            postgres_image: postgres:16
            coverage: false
          - postgres_label: postgres-15
            postgres_version: 15
            postgres_image: postgres:15
            coverage: false
          - postgres_label: postgres-14
            postgres_version: 14
            postgres_image: postgres:14
            coverage: false
          - postgres_label: orioledb-beta14-pg17
            postgres_version: 17
            postgres_image: orioledb/orioledb:beta14-pg17
            coverage: false
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5430
      POSTGRES_REPLICA_PORT: 6430
      POSTGRES_HOST: localhost
      TESTS_DATABASE_HOST: localhost
      TESTS_DATABASE_PORT: 5430
      TESTS_DATABASE_REPLICA_HOST: localhost
      TESTS_DATABASE_REPLICA_PORT: 6430
      TESTS_DATABASE_START_PORT: 5430
      NUM_LOCAL_DATABASES: 4
      TESTS_DATABASE_USERNAME: postgres
      TESTS_DATABASE_PASSWORD: postgres
      TESTS_DATABASE_TLS_ENABLED: "true"
      TESTS_DATABASE_TLS_ROOT_CERT: ${{ github.workspace }}/target/postgres-tls/root.crt
      TESTS_CLICKHOUSE_URL: http://localhost:8123
      TESTS_CLICKHOUSE_USER: etl
      TESTS_CLICKHOUSE_PASSWORD: etl
      ETL_DUCKDB_EXTENSION_ROOT: ${{ github.workspace }}/vendor/duckdb/extensions
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: test-full

      - name: Start Docker Compose (${{ matrix.postgres_label }})
        run: |
          POSTGRES_IMAGE=${{ matrix.postgres_image }} \
          POSTGRES_VERSION=${{ matrix.postgres_version }} \
            cargo xtask postgres start

      - name: Vendor DuckDB Extensions
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) duckdb_platform=linux_amd64 ;;
            aarch64) duckdb_platform=linux_arm64 ;;
            *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          ./scripts/bin/vendor-duckdb-extensions.sh --platform "${duckdb_platform}"

      - name: Install sqlx-cli
        run: |
          cargo install sqlx-cli \
            --version 0.9.0-alpha.1 \
            --features native-tls,postgres \
            --no-default-features \
            --locked

      - name: Migrate Database
        run: |
          sudo apt-get install libpq-dev -y
          cargo x migrate etl-api

      - name: Set up BigQuery Credentials
        # Conditional: fork PRs never receive secrets, BigQuery tests skipped gracefully.
        env:
          TESTS_BIGQUERY_PROJECT_ID: ${{ secrets.TESTS_BIGQUERY_PROJECT_ID }}
          TESTS_BIGQUERY_SA_KEY_JSON: ${{ secrets.TESTS_BIGQUERY_SA_KEY_JSON }}
        run: |
          if [ -n "${TESTS_BIGQUERY_SA_KEY_JSON}" ]; then
            printf '%s' "${TESTS_BIGQUERY_SA_KEY_JSON}" > /tmp/bigquery-sa-key.json
            {
              echo "TESTS_BIGQUERY_SA_KEY_PATH=/tmp/bigquery-sa-key.json"
              echo "TESTS_BIGQUERY_PROJECT_ID=${TESTS_BIGQUERY_PROJECT_ID}"
              echo "REQUIRE_BIGQUERY_CREDENTIALS=true"
            } >> "$GITHUB_ENV"
          fi

      - name: Install cargo-nextest
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-nextest

      - name: Run Unit and Integration Tests
        if: matrix.coverage == false
        run: |
          cargo xtask nextest run

      - name: Install cargo-llvm-cov
        if: matrix.coverage == true
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-llvm-cov

      - name: Run Doctests
        run: |
          cargo test --doc --workspace --all-features --no-fail-fast

      - name: Run Unit and Integration Tests with Coverage
        if: matrix.coverage == true
        run: |
          cargo xtask nextest llvm-cov

      - name: Merge Coverage Data
        if: matrix.coverage == true
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload Coverage to Coveralls
        if: matrix.coverage == true
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          fail-on-error: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: lcov.info
          debug: true
