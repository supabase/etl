name: Benchmark

on:
  workflow_dispatch:
    inputs:
      benchmark_runner:
        description: Blacksmith runner size for the benchmark job.
        required: true
        type: choice
        options:
          - blacksmith-8vcpu-ubuntu-2404
          - blacksmith-16vcpu-ubuntu-2404
          - blacksmith-32vcpu-ubuntu-2404
        default: blacksmith-16vcpu-ubuntu-2404
      warehouses:
        description: Number of TPC-C warehouses to prepare.
        required: true
        default: "10"
      tpcc_threads:
        description: Optional go-tpc prepare and streaming threads. Empty derives from warehouses and runner CPUs.
        required: false
        default: ""
      streaming_duration_seconds:
        description: Duration for TPC-C streaming.
        required: false
        default: "60"
      streaming_drain_quiet_ms:
        description: Quiet period with no CDC events before TPC-C streaming is considered drained.
        required: true
        default: "2000"
      max_table_sync_workers:
        description: Maximum table sync workers.
        required: true
        default: "8"
      max_copy_connections_per_table:
        description: Maximum copy connections per table.
        required: true
        default: "4"
      batch_max_fill_ms:
        description: Maximum stream batch fill time in milliseconds.
        required: true
        default: "1000"
      memory_budget_ratio:
        description: Ratio of detected memory reserved for stream batch bytes.
        required: true
        default: "0.2"
      enable_memory_backpressure:
        description: Enable ETL memory backpressure during the benchmark.
        required: true
        type: boolean
        default: false
      destination:
        description: Destination to benchmark.
        required: true
        type: choice
        options:
          - "null"
          - bigquery
        default: "null"
      bq_project_id:
        description: BigQuery project ID when destination is bigquery.
        required: false
        default: ""
      bq_dataset_id:
        description: BigQuery dataset ID when destination is bigquery.
        required: false
        default: ""
      force_prepare:
        description: Drop and regenerate existing TPC-C tables.
        required: true
        type: boolean
        default: false
      skip_table_copy:
        description: Skip the table-copy benchmark.
        required: true
        type: boolean
        default: false
      skip_table_streaming:
        description: Skip the table-streaming benchmark.
        required: true
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: bench
  POSTGRES_PORT: 5430
  POSTGRES_HOST: localhost

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark:
    name: Benchmark
    runs-on: ${{ inputs.benchmark_runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: benchmark

      - name: Install system tools
        run: |
          set -euo pipefail
          missing_packages=()
          if ! command -v go >/dev/null 2>&1; then
            missing_packages+=(golang-go)
          fi
          if ! command -v psql >/dev/null 2>&1; then
            missing_packages+=(postgresql-client)
          fi
          if ! command -v unzip >/dev/null 2>&1; then
            missing_packages+=(unzip)
          fi
          if (( ${#missing_packages[@]} > 0 )); then
            sudo apt-get update
            sudo apt-get install -y "${missing_packages[@]}"
          fi
          go install github.com/pingcap/go-tpc/cmd/go-tpc@v1.0.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Start Postgres
        run: |
          POSTGRES_IMAGE=postgres:18 \
          POSTGRES_VERSION=18 \
            cargo xtask postgres start --shards 1 --base-port "$POSTGRES_PORT" --source-only

      - name: Prepare BigQuery key
        if: inputs.destination == 'bigquery'
        env:
          BQ_SA_KEY_JSON: ${{ secrets.BENCHMARK_BQ_SA_KEY_JSON }}
        run: |
          set -euo pipefail
          if [[ -z "${BQ_SA_KEY_JSON}" ]]; then
            echo "BENCHMARK_BQ_SA_KEY_JSON secret is required for BigQuery benchmarks." >&2
            exit 1
          fi
          printf '%s' "${BQ_SA_KEY_JSON}" > "$RUNNER_TEMP/bigquery-key.json"

      - name: Record benchmark environment
        env:
          BENCHMARK_RUNNER_INPUT: ${{ inputs.benchmark_runner }}
          DESTINATION_INPUT: ${{ inputs.destination }}
          ENABLE_MEMORY_BACKPRESSURE_INPUT: ${{ inputs.enable_memory_backpressure }}
          MEMORY_BUDGET_RATIO_INPUT: ${{ inputs.memory_budget_ratio }}
          TPCC_THREADS_INPUT: ${{ inputs.tpcc_threads }}
          WAREHOUSES_INPUT: ${{ inputs.warehouses }}
        run: |
          set -euo pipefail
          mkdir -p target/bench-results

          tpcc_threads="${TPCC_THREADS_INPUT:-derived}"
          host_memory="$(awk '/MemTotal/ { printf "%.2f GiB", $2 / 1024 / 1024 }' /proc/meminfo || true)"
          if [[ -z "${host_memory}" ]]; then
            host_memory="unavailable"
          fi

          cgroup_memory_limit="unavailable"
          if [[ -r /sys/fs/cgroup/memory.max ]]; then
            cgroup_memory_limit="$(cat /sys/fs/cgroup/memory.max)"
          elif [[ -r /sys/fs/cgroup/memory/memory.limit_in_bytes ]]; then
            cgroup_memory_limit="$(cat /sys/fs/cgroup/memory/memory.limit_in_bytes)"
          fi

          {
            echo "## Benchmark environment"
            echo
            echo "| Setting | Value |"
            echo "| --- | --- |"
            echo "| Runner | ${BENCHMARK_RUNNER_INPUT} |"
            echo "| Runner name | ${RUNNER_NAME} |"
            echo "| Runner OS | ${RUNNER_OS} |"
            echo "| Runner arch | ${RUNNER_ARCH} |"
            echo "| CPUs | $(nproc) |"
            echo "| Host memory | ${host_memory} |"
            echo "| Cgroup memory limit | ${cgroup_memory_limit} |"
            echo "| Warehouses | ${WAREHOUSES_INPUT} |"
            echo "| TPC-C threads | ${tpcc_threads} |"
            echo "| Memory budget ratio | ${MEMORY_BUDGET_RATIO_INPUT} |"
            echo "| Memory backpressure | ${ENABLE_MEMORY_BACKPRESSURE_INPUT} |"
            echo "| Destination | ${DESTINATION_INPUT} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run benchmarks
        env:
          BATCH_MAX_FILL_MS_INPUT: ${{ inputs.batch_max_fill_ms }}
          BQ_DATASET_ID_INPUT: ${{ inputs.bq_dataset_id }}
          BQ_PROJECT_ID_INPUT: ${{ inputs.bq_project_id }}
          BQ_SA_KEY_FILE: ${{ runner.temp }}/bigquery-key.json
          DESTINATION_INPUT: ${{ inputs.destination }}
          ENABLE_MEMORY_BACKPRESSURE_INPUT: ${{ inputs.enable_memory_backpressure }}
          FORCE_PREPARE_INPUT: ${{ inputs.force_prepare }}
          MAX_COPY_CONNECTIONS_PER_TABLE_INPUT: ${{ inputs.max_copy_connections_per_table }}
          MAX_TABLE_SYNC_WORKERS_INPUT: ${{ inputs.max_table_sync_workers }}
          MEMORY_BUDGET_RATIO_INPUT: ${{ inputs.memory_budget_ratio }}
          SKIP_TABLE_COPY_INPUT: ${{ inputs.skip_table_copy }}
          SKIP_TABLE_STREAMING_INPUT: ${{ inputs.skip_table_streaming }}
          STREAMING_DRAIN_QUIET_MS_INPUT: ${{ inputs.streaming_drain_quiet_ms }}
          STREAMING_DURATION_SECONDS_INPUT: ${{ inputs.streaming_duration_seconds }}
          TPCC_THREADS_INPUT: ${{ inputs.tpcc_threads }}
          WAREHOUSES_INPUT: ${{ inputs.warehouses }}
        run: |
          set -euo pipefail

          args=(
            benchmark
            --host "$POSTGRES_HOST"
            --port "$POSTGRES_PORT"
            --database "$POSTGRES_DB"
            --username "$POSTGRES_USER"
            --password "$POSTGRES_PASSWORD"
            --warehouses "$WAREHOUSES_INPUT"
            --streaming-drain-quiet-ms "$STREAMING_DRAIN_QUIET_MS_INPUT"
            --max-table-sync-workers "$MAX_TABLE_SYNC_WORKERS_INPUT"
            --max-copy-connections-per-table "$MAX_COPY_CONNECTIONS_PER_TABLE_INPUT"
            --batch-max-fill-ms "$BATCH_MAX_FILL_MS_INPUT"
            --memory-budget-ratio "$MEMORY_BUDGET_RATIO_INPUT"
            --destination "$DESTINATION_INPUT"
            --output-dir target/bench-results
          )

          if [[ -n "$TPCC_THREADS_INPUT" ]]; then
            args+=(--tpcc-threads "$TPCC_THREADS_INPUT")
          fi

          if [[ -n "$STREAMING_DURATION_SECONDS_INPUT" ]]; then
            args+=(--streaming-duration-seconds "$STREAMING_DURATION_SECONDS_INPUT")
          fi

          if [[ "$ENABLE_MEMORY_BACKPRESSURE_INPUT" == "true" ]]; then
            args+=(--enable-memory-backpressure)
          fi

          if [[ "$FORCE_PREPARE_INPUT" == "true" ]]; then
            args+=(--force-prepare)
          fi

          if [[ "$SKIP_TABLE_COPY_INPUT" == "true" ]]; then
            args+=(--skip-table-copy)
          fi

          if [[ "$SKIP_TABLE_STREAMING_INPUT" == "true" ]]; then
            args+=(--skip-table-streaming)
          fi

          if [[ "$DESTINATION_INPUT" == "bigquery" ]]; then
            args+=(--bq-project-id "$BQ_PROJECT_ID_INPUT")
            args+=(--bq-dataset-id "$BQ_DATASET_ID_INPUT")
            args+=(--bq-sa-key-file "$BQ_SA_KEY_FILE")
          fi

          cargo xtask "${args[@]}"

      - name: Summarize benchmark results
        run: |
          set -euo pipefail

          python3 <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          results_dir = Path("target/bench-results")

          def load(name):
              path = results_dir / name
              if not path.exists():
                  return None
              return json.loads(path.read_text())

          def number(value, digits=2):
              if value is None:
                  return "-"
              if isinstance(value, int) or float(value).is_integer():
                  return f"{int(value):,}"
              return f"{float(value):,.{digits}f}"

          def seconds(ms):
              if ms is None:
                  return "-"
              return f"{float(ms) / 1000:,.2f} s"

          def table(headers, rows):
              print("| " + " | ".join(headers) + " |")
              print("| " + " | ".join("---" for _ in headers) + " |")
              for row in rows:
                  print("| " + " | ".join(str(cell) for cell in row) + " |")

          table_copy = load("table_copy.json")
          table_streaming = load("table_streaming.json")

          print()
          print("## Benchmark results")
          print()

          summary = []
          if table_copy:
              summary.append([
                  "Table copy",
                  f"{number(table_copy.get('rows_per_second'))} rows/s",
                  f"{number(table_copy.get('estimated_mib_per_second'))} MiB/s",
                  seconds(table_copy.get("total_ms")),
              ])
          if table_streaming:
              summary.append([
                  "Table streaming",
                  f"{number(table_streaming.get('end_to_end_with_shutdown_events_per_second'))} events/s",
                  f"{number(table_streaming.get('end_to_end_with_shutdown_estimated_mib_per_second'))} MiB/s",
                  seconds(table_streaming.get("total_ms")),
              ])

          if summary:
              table(["Benchmark", "Throughput", "Data rate", "Total"], summary)
              print()
          else:
              print("No benchmark JSON reports were written.")
              raise SystemExit(0)

          if table_copy:
              print("### Table copy")
              table(
                  ["Metric", "Value"],
                  [
                      ["Rows copied", number(table_copy.get("copied_rows"))],
                      ["Rows/s", number(table_copy.get("rows_per_second"))],
                      ["Decoded MiB", number(table_copy.get("estimated_copied_mib"))],
                      ["Decoded MiB/s", number(table_copy.get("estimated_mib_per_second"))],
                      ["Copy wait", seconds(table_copy.get("copy_wait_ms"))],
                      ["Total", seconds(table_copy.get("total_ms"))],
                  ],
              )
              print()

          if table_streaming:
              print("### Table streaming")
              stats = table_streaming.get("destination_stats", {})
              table(
                  ["Metric", "Value"],
                  [
                      ["Workload", table_streaming.get("workload", "-")],
                      ["Produced events", number(table_streaming.get("produced_events"))],
                      ["Observed CDC events", number(table_streaming.get("observed_cdc_events"))],
                      ["Events/s", number(table_streaming.get("end_to_end_with_shutdown_events_per_second"))],
                      ["Decoded MiB/s", number(table_streaming.get("end_to_end_with_shutdown_estimated_mib_per_second"))],
                      ["Inserts", number(stats.get("inserts"))],
                      ["Updates", number(stats.get("updates"))],
                      ["Deletes", number(stats.get("deletes"))],
                      ["Total", seconds(table_streaming.get("total_ms"))],
                  ],
              )
              print()
          PY

      - name: Compare benchmark results
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          set +e
          cargo xtask benchmark-compare \
            --current-dir target/bench-results \
            --output target/bench-results/benchmark-comparison.md
          status=$?
          set -e
          cat target/bench-results/benchmark-comparison.md >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: target/bench-results/*.json
          if-no-files-found: error
