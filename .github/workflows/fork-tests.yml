name: Fork PR Tests

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: fork-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  notice:
    name: Fork PR Notice
    if: github.event.pull_request.head.repo.fork == true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      pull-requests: write
    steps:
      - name: Post security notice
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: fork-pr-security-notice
          message: |
            ## Integration Tests -- Maintainer Approval Required

            This PR is from a fork and requires maintainer approval to run integration tests.

            **Before approving**, navigate to the
            [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            and review this workflow run. Verify that this PR does not:
            - Modify CI workflow files, scripts, or build configuration
            - Add suspicious dependencies in `Cargo.toml`
            - Contain code that could exfiltrate environment variables or secrets

            Approving will expose BigQuery service account credentials to this workflow run.

  authorize:
    name: Authorize
    needs: notice
    if: github.event.pull_request.head.repo.fork == true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: integration-tests-secrets
    steps:
      - run: echo "Approved by maintainer"

  fork:
    needs: authorize
    if: github.event.pull_request.head.repo.fork == true
    uses: ./.github/workflows/tests-full.yml
    with:
      checkout_ref: ${{ github.event.pull_request.head.sha }}
      checkout_repository: ${{ github.event.pull_request.head.repo.full_name }}
    secrets: inherit

  fork-status:
    name: Fork Status
    needs: fork
    if: always() && github.event.pull_request.head.repo.fork == true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      statuses: write
    steps:
      - name: Post test result to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state="failure"
          description="Fork PR integration tests failed"
          if [ "${{ needs.fork.result }}" = "success" ]; then
            state="success"
            description="Fork PR integration tests passed"
          fi
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            --method POST \
            --field state="$state" \
            --field context="fork / Tests (Full)" \
            --field description="$description"

  internal-skip:
    name: Internal Skip
    if: github.event.pull_request.head.repo.fork != true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      statuses: write
    steps:
      - name: Post skip status to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            --method POST \
            --field state="success" \
            --field context="fork / Tests (Full)" \
            --field description="Skipped - internal PR"
